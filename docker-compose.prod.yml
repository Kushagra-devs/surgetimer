version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env.production
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: always
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: always
    env_file:
      - .env.production
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:

